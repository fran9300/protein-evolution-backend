spring.application.name=protein-evolution-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/protein_explorer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

analyzer.service.url=${ANALYZER_SERVICE_URL:http://localhost:8000}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#TimeZone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC